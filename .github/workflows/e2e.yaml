name: E2E

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  e2e-tests:
    name: e2e tests
    runs-on: ubuntu-latest

    env:
      GOPATH: ${{ github.workspace }}
      GO111MODULE: on
      KO_DOCKER_REPO: registry.local:5000/tekton
      CLUSTER_DOMAIN: c${{ github.run_id }}.local
      ARTIFACTS: ${{ github.workspace }}/artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: tektoncd/dashboard
          path: ${{ github.workspace }}/src/github.com/tektoncd/dashboard

      - name: Checkout setup-kind.sh
        uses: actions/checkout@v4
        with:
          repository: tektoncd/pipeline
          ref: d306d649df2dbd2badaba6a90459efd05c753d2f
          path: scripts
          sparse-checkout: |
            hack/setup-kind.sh
          sparse-checkout-cone-mode: false

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: 1.22.5

      - name: Install Dependencies
        working-directory: ./
        run: |
          echo '::group::install ko'
          curl -L https://github.com/ko-build/ko/releases/download/v0.15.4/ko_0.15.4_Linux_x86_64.tar.gz | tar xzf - ko
          chmod +x ./ko
          sudo mv ko /usr/local/bin
          echo '::endgroup::'

          echo '::group::create required folders'
          mkdir -p "${ARTIFACTS}"
          echo '::endgroup::'

          echo "${GOPATH}/bin" >> "$GITHUB_PATH"          

      - name: Run tests
        working-directory: ${{ github.workspace }}/src/github.com/tektoncd/dashboard
        run: |
          ${{ github.workspace }}/scripts/hack/setup-kind.sh \
            --registry-url $(echo ${KO_DOCKER_REPO} | cut -d'/' -f 1) \
            --cluster-suffix c${{ github.run_id }}.local \
            --nodes 3 \
            --k8s-version v1.28.x \
            --e2e-script ./test/e2e-tests-prow.sh \
            --e2e-env ./test/e2e-tests-kind-prow.env

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test
          path: ${{ env.ARTIFACTS }}

      - uses: chainguard-dev/actions/kind-diag@main
        if: ${{ failure() }}
        with:
          artifact-name: test-logs

      - name: Dump Artifacts
        if: ${{ failure() }}
        run: |
          if [[ -d ${{ env.ARTIFACTS }} ]]; then
            cd ${{ env.ARTIFACTS }}
            for x in $(find . -type f); do
              echo "::group:: artifact $x"
              cat $x
              echo '::endgroup::'
            done
          fi

      # - name: Upload test results
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ matrix.k8s-version }}-${{ matrix.feature-flags }}
      #     path: ${{ env.ARTIFACTS }}

